# ── Perfil LOCAL: H2 em memória (substituir Supabase quando sem IPv6) ────────
# Rodar com: java -jar target/calculator-1.0.0.jar --spring.profiles.active=local
spring.datasource.url=jdbc:h2:mem:obradb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
