server.port=8080
spring.application.name=obra-calculator

# ── Supabase / PostgreSQL ────────────────────────────────────────────────────
# Session Mode pooler (IPv4, porta 5432) — compatível com Hibernate prepared statements
# O host direto (db.*.supabase.co) retorna apenas AAAA (IPv6) e não funciona sem IPv6
spring.datasource.url=jdbc:postgresql://aws-0-us-east-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.efvjiosjxenrgeygvqms
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Jakarta Faces / Joinfaces ────────────────────────────────────────────────
joinfaces.faces.project-stage=Development
joinfaces.faces.default-suffix=.xhtml
