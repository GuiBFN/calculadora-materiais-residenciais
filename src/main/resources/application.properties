server.port=8080
spring.application.name=obra-calculator

# ── Supabase / PostgreSQL ────────────────────────────────────────────────────
# Conexão direta (porta 5432), NÃO usar Transaction Pooler (porta 6543)
spring.datasource.url=jdbc:postgresql://db.efvjiosjxenrgeygvqms.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Jakarta Faces / Joinfaces ────────────────────────────────────────────────
joinfaces.faces.project-stage=Development
joinfaces.faces.default-suffix=.xhtml
